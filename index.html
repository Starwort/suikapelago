<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suikapelago</title>
    <meta property="og:title" content="Suikapelago" />
    <meta property="og:image"
          content="https://tombofry.github.io/suika-game/screenshot.png" />
    <link rel="stylesheet" href="./index.css" />
  </head>

  <body>
    <div class="container">
      <div id="scores">
        <div class="game-status-label">Score</div>
        <div id="game-score">0</div>
        <div class="game-status-label">Best Score</div>
        <div id="game-highscore-value">0</div>
      </div>
      <div id="game-canvas">
        <div id="game-ui">
          <div id="game-ceiling">&#x200b;</div>
          <div id="game-end-container">
            <div id="game-end">
              <div id="game-end-title">Game Over!</div>
              <a id="game-end-link" href="">Try Again</a>
            </div>
          </div>
        </div>
      </div>
      <div id="next">
        <div class="game-status-label">Next</div>
        <img id="game-next-fruit" src="./assets/img/circle0.png" />
      </div>
      <div id="circle">
        <div class="circle-container">
          <img id="circle-0" src="./assets/img/circle0.png" />
          <img id="circle-1" class="circle-unavailable"
               src="./assets/img/circle1.png" />
          <img id="circle-2" class="circle-unavailable"
               src="./assets/img/circle2.png" />
          <img id="circle-3" class="circle-unavailable"
               src="./assets/img/circle3.png" />
          <img id="circle-4" class="circle-unavailable"
               src="./assets/img/circle4.png" />
          <img id="circle-5" class="circle-unavailable"
               src="./assets/img/circle5.png" />
          <img id="circle-6" class="circle-unavailable"
               src="./assets/img/circle6.png" />
          <img id="circle-7" class="circle-unavailable"
               src="./assets/img/circle7.png" />
          <img id="circle-8" class="circle-unavailable"
               src="./assets/img/circle8.png" />
          <img id="circle-9" class="circle-unavailable"
               src="./assets/img/circle9.png" />
          <img id="circle-10" class="circle-unavailable"
               src="./assets/img/circle10.png" />
        </div>
      </div>
      <div id="ap-chat">
        <div id="login">
          <label>
            Host and Port
            <input type="text" id="server" placeholder="archipelago.gg:12345" />
          </label>
          <label>
            Player Name
            <input type="text" id="slot" placeholder="Suika Player" />
          </label>
          <label>
            Password
            <input type="text" id="password" placeholder="Leave blank if no password" />
          </label>
          <div id="connect-error"></div>
          <button id="connect">Log In and Connect</button>
        </div>
        <div id="chat" style="display: none">
          <span style="grid-area: title">Chat</span>
          <div id="chat-log"></div>
          <input type="text" id="chat-box">
          <button id="chat-send">Send</button>
        </div>
      </div>
    </div>
    <script type="text/javascript" src="./matter.js"></script>
    <script src="./archipelago.js"></script>
    <script type="text/javascript" src="./index.js?v=4"></script>
  </body>

</html>
